services:  
  db:
    container_name: PostgreSQL
    image: postgres
    mem_limit: 256m
    cpu_shares: 768
    healthcheck:
      test: ["CMD", "pg_isready", "-q", "-d", "backson_DB", "-U", "root"]
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: backsonroot
      POSTGRES_DB: backson_DB
    volumes:
      - /volume1/docker/postgresql:/var/lib/postgresql/data:rw
    ports:
      - 2665:5432
    restart: on-failure:5
  
  pgadmin:
    container_name: pgAdmin
    image: dpage/pgadmin4:latest
    mem_limit: 256m
    cpu_shares: 768
    healthcheck:
      test: wget --no-verbose --tries=1 --spider http://localhost:5050
    environment:
      PGADMIN_DEFAULT_EMAIL: mike@aream.ca
      PGADMIN_DEFAULT_PASSWORD: backson
      PGADMIN_LISTEN_PORT: 5050
    ports:
      - 2660:5050
    volumes:
      - /volume1/docker/postgresadmin:/var/lib/pgadmin:rw
    restart: on-failure:5