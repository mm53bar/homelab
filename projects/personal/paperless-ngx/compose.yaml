# Docker Compose file for running paperless from the Docker Hub.
# This file contains everything paperless needs to run.
# Paperless supports amd64, arm and arm64 hardware.
#
# All compose files of paperless configure paperless in the following way:
#
# - Paperless is (re)started on system boot, if it was running before shutdown.
# - Docker volumes for storing data are managed by Docker.
# - Folders for importing and exporting files are created in the same directory
#   as this file and mounted to the correct folders inside the container.
# - Paperless listens on port 8010.
#
# SQLite is used as the database. The SQLite file is stored in the data volume.
#
# To install and update paperless with this file, do the following:
#
# - Open portainer Stacks list and click 'Add stack'
# - Paste the contents of this file and assign a name, e.g. 'Paperless'
# - Click 'Deploy the stack' and wait for it to be deployed
# - Open the list of containers, select paperless_webserver_1
# - Click 'Console' and then 'Connect' to open the command line inside the container
# - Run 'python3 manage.py createsuperuser' to create a user
# - Exit the console
#
# For more extensive installation and update instructions, refer to the
# documentation.

version: "3.4"
services:
  broker:
    image: docker.io/library/redis:7
    restart: unless-stopped
    user: ${PUID:-1027}:${PGID:-100}
    networks:
      - downloaders    
    volumes:
      - ${CONFIG_STORAGE:-/volume1/docker}/paperless-ngx/redis:/data

  webserver:
    image: ghcr.io/paperless-ngx/paperless-ngx:latest
    restart: unless-stopped
    networks:
      - downloaders    
    depends_on:
      - broker

    ports:
      - "${PAPERLESS_PORT:-8010}:8000"
    healthcheck:
      test: ["CMD", "curl", "-fs", "-S", "--max-time", "2", "http://localhost:8000"]
      interval: 30s
      timeout: 10s
      retries: 5
    volumes:
      - ${CONFIG_STORAGE:-/volume1/docker}/paperless-ngx/data:/usr/src/paperless/data
      - ${CONFIG_STORAGE:-/volume1/docker}/paperless-ngx/export:/usr/src/paperless/export
      - ${DATA_STORAGE:-/volume1/data}/papers:/usr/src/paperless/media      
      - ${IMPORT_STORAGE:-/volume1/data/import}/papers:/usr/src/paperless/consume
    environment:
      PAPERLESS_REDIS: ${PAPERLESS_REDIS:-redis://broker:6379}
      USERMAP_UID: ${PUID:-1027}
      USERMAP_GID: ${PGID:-100}
      PAPERLESS_SECRET_KEY: ${PAPERLESS_SECRET_KEY:?PAPERLESS_SECRET_KEY must be set}
      PAPERLESS_TIME_ZONE: ${TZ:-America/Edmonton}
      PAPERLESS_OCR_LANGUAGE: ${PAPERLESS_OCR_LANGUAGE:-eng}
      PAPERLESS_FILENAME_FORMAT: ${PAPERLESS_FILENAME_FORMAT:-{created_year}/{correspondent}/{created} {title}}
      PAPERLESS_FILENAME_FORMAT_REMOVE_NONE: true
      PAPERLESS_ADMIN_USER: ${PAPERLESS_ADMIN_USER:-admin}
      PAPERLESS_ADMIN_PASSWORD: ${PAPERLESS_ADMIN_PASSWORD:?PAPERLESS_ADMIN_PASSWORD must be set}
      PAPERLESS_URL: ${PAPERLESS_URL:-https://paperless.backson.boo}   

networks: 
  downloaders:
    external: true
