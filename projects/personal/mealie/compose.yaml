version: "3.7"
services:
  mealie:
    image: ghcr.io/mealie-recipes/mealie:v1.0.0-RC1.1
    container_name: mealie
    ports:
        - 9925:9000
    deploy:
      resources:
        limits:
          memory: 1000M
    volumes:
      - /volume1/docker/mealie:/app/data/
    environment:
      - ALLOW_SIGNUP=true
      - PUID=1027
      - PGID=100
      - TZ=America/Edmonton
      - MAX_WORKERS=1
      - WEB_CONCURRENCY=1
      - BASE_URL=https://mealie.backson.boo
    restart: always
networks: 
  downloaders: 
    external: true    