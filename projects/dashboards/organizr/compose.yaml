version: "3.6"
services:
  organizr:
    container_name: organizr
    hostname: organizr
    image: organizr/organizr:latest
    restart: unless-stopped
    ports:
      - 8080:80
    volumes:
      - /volume1/docker/organizr:/config
    environment:
      - PUID=1027
      - PGID=100
      - TZ=America/Edmonton
networks: 
  default: 
    external: true
    name: downloaders 