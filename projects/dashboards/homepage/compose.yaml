version: "3.3"
services:
  homepage:
    image: ghcr.io/benphelps/homepage:latest
    container_name: homepage
    ports:
      - 3000:3000
    volumes:
      - /volume1/docker/homepage:/app/config
      - /var/run/docker.sock:/var/run/docker.sock
networks: 
  default: 
    external: true
    name: downloaders           