# Shelfmark - Book Downloader (formerly Calibre-Web-Automated-Book-Downloader)
# Built-in Cloudflare bypass - no separate service needed!
services:
  shelfmark:
    image: ghcr.io/calibrain/shelfmark:latest
    container_name: shelfmark
    restart: unless-stopped
    ports:
      - ${FLASK_PORT:-8084}:8084
    volumes:
      # Config, database, and artwork cache
      - ${CONFIG_STORAGE:-/volume1/docker}/shelfmark:/config
      # Downloaded books (points to CWA ingest folder for auto-import)
      - ${IMPORT_STORAGE:-/volume1/data/import}/books:/books
    environment:
      - FLASK_PORT=${FLASK_PORT:-8084}
      - FLASK_DEBUG=${FLASK_DEBUG:-false}
      - INGEST_DIR=${INGEST_DIR:-/books}
      - BOOK_LANGUAGE=${BOOK_LANGUAGE:-en}
      - TZ=${TZ:-America/Edmonton}
      - PUID=${PUID:-1027}
      - PGID=${PGID:-100}
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8084/api/health"]
      interval: 30s
      timeout: 30s
      retries: 3
      start_period: 5s