---
version: "2.1"
services:
  mylar3:
    image: lscr.io/linuxserver/mylar3
    container_name: mylar3
    environment:
      - PUID=1027
      - PGID=100
    volumes:
      - /volume1/docker/mylar3:/config
      - /volume1/data:/data
    ports:
      - 8090:8090
    restart: unless-stopped
networks: 
  default: 
    external: true
    name: downloaders