---
version: "2.1"
services:
  lazylibrarian2:
    image: lscr.io/linuxserver/lazylibrarian:latest
    container_name: lazylibrarian2
    environment:
      - PUID=1027
      - PGID=100
      - TZ=America/Edmonton
      - DOCKER_MODS=linuxserver/calibre-web:calibre
    volumes:
      - /volume1/docker/lazylibrarian2:/config
      - /volume1/data:/data
    ports:
      - 5298:5299
    restart: unless-stopped
networks: 
  default: 
    external: true
    name: downloaders