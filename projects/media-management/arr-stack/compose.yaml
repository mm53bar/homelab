services:
  # Indexer Manager - Configure this first
  prowlarr:
    image: ghcr.io/linuxserver/prowlarr:develop
    container_name: prowlarr
    environment:
      - PUID=1027
      - PGID=100
      - TZ=America/Edmonton
    volumes:
      - /volume1/docker/prowlarr:/config
    ports:
      - 9696:9696
    restart: unless-stopped

  # TV Shows Management
  sonarr:
    image: lscr.io/linuxserver/sonarr:latest
    container_name: sonarr
    environment:
      - PUID=1027
      - PGID=100
      - TZ=America/Edmonton
    volumes:
      - /volume1/docker/sonarr:/config
      - /volume1/data:/data
    ports:
      - 8989:8989
    restart: unless-stopped

  # Movies Management
  radarr:
    image: lscr.io/linuxserver/radarr:latest
    container_name: radarr
    environment:
      - PUID=1027
      - PGID=100
      - TZ=America/Edmonton
    volumes:
      - /volume1/docker/radarr:/config
      - /volume1/data:/data
    ports:
      - 7878:7878
    restart: unless-stopped

  # Music Management
  lidarr:
    image: lscr.io/linuxserver/lidarr:latest
    container_name: lidarr
    environment:
      - PUID=1027
      - PGID=100
      - TZ=America/Edmonton
    volumes:
      - /volume1/docker/lidarr:/config
      - /volume1/data:/data
    ports:
      - 8686:8686
    restart: unless-stopped

  # Books/Audiobooks Management
  readarr:
    image: cr.hotio.dev/hotio/readarr:nightly
    container_name: readarr
    environment:
      - PUID=1027
      - PGID=100
      - TZ=America/Edmonton
    volumes:
      - /volume1/docker/readarr:/config
      - /volume1/data:/data
    ports:
      - 8787:8787
    restart: unless-stopped

  # Subtitle Management
  bazarr:
    image: hotio/bazarr:release
    container_name: bazarr
    environment:
      - PUID=1027
      - PGID=100
      - TZ=America/Edmonton
    volumes:
      - /volume1/docker/bazaar:/config
      - /volume1/data:/data
    ports:
      - 6767:6767
    restart: unless-stopped

  # Torrent Indexer Proxy (Legacy - consider migrating to Prowlarr)
  jackett:
    image: lscr.io/linuxserver/jackett
    container_name: jackett
    environment:
      - PUID=1027
      - PGID=100
      - TZ=America/Edmonton
      - AUTO_UPDATE=true
    volumes:
      - /volume1/docker/jackett:/config
      - /volume1/data:/data
    ports:
      - 9117:9117
    restart: unless-stopped

networks:
  default:
    name: media-network
    external: true
