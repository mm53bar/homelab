services:
  # Cloudflare Bypass - Helps Prowlarr access protected indexers
  flaresolverr:
    image: flaresolverr/flaresolverr:latest
    container_name: arr-flaresolverr
    environment:
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - LOG_HTML=false
      - CAPTCHA_SOLVER=none
      - TZ=${TZ:-America/Edmonton}
    expose:
      - 8191/tcp
    restart: unless-stopped

  # Indexer Manager - Configure this first
  prowlarr:
    image: ghcr.io/linuxserver/prowlarr:develop
    container_name: arr-prowlarr
    environment:
      - PUID=${PUID:-1027}
      - PGID=${PGID:-100}
      - TZ=${TZ:-America/Edmonton}
    volumes:
      - ${DOCKER_VOLUME_STORAGE:-/volume1/docker}/prowlarr:/config
    expose:
      - 9696/tcp
    ports:
      - ${PROWLARR_PORT:-9696}:9696
    restart: unless-stopped
    depends_on:
      - flaresolverr
    #networks:
    #  - proxy
    #labels:
    #  - traefik.enable=true
    #  - traefik.docker.network=proxy
    #  - traefik.http.routers.prowlarr.rule=Host(`prowlarr.example.com`)
    #  - traefik.http.services.prowlarr.loadbalancer.server.port=9696
    #  # Optional middlewares for IP whitelisting or authentication
    #  # - traefik.http.routers.prowlarr.middlewares=local-ipwhitelist@file

  # TV Shows Management
  sonarr:
    image: lscr.io/linuxserver/sonarr:latest
    container_name: arr-sonarr
    environment:
      - PUID=${PUID:-1027}
      - PGID=${PGID:-100}
      - TZ=${TZ:-America/Edmonton}
    volumes:
      - ${DOCKER_VOLUME_STORAGE:-/volume1/docker}/sonarr:/config
      - ${MEDIA_STORAGE:-/volume1/data}:/data
    expose:
      - 8989/tcp
    ports:
      - ${SONARR_PORT:-8989}:8989
    restart: unless-stopped
    #networks:
    #  - proxy
    #labels:
    #  - traefik.enable=true
    #  - traefik.docker.network=proxy
    #  - traefik.http.routers.sonarr.rule=Host(`sonarr.example.com`)
    #  - traefik.http.services.sonarr.loadbalancer.server.port=8989

  # Movies Management
  radarr:
    image: lscr.io/linuxserver/radarr:latest
    container_name: arr-radarr
    environment:
      - PUID=${PUID:-1027}
      - PGID=${PGID:-100}
      - TZ=${TZ:-America/Edmonton}
    volumes:
      - ${DOCKER_VOLUME_STORAGE:-/volume1/docker}/radarr:/config
      - ${MEDIA_STORAGE:-/volume1/data}:/data
    expose:
      - 7878/tcp
    ports:
      - ${RADARR_PORT:-7878}:7878
    restart: unless-stopped
    #networks:
    #  - proxy
    #labels:
    #  - traefik.enable=true
    #  - traefik.docker.network=proxy
    #  - traefik.http.routers.radarr.rule=Host(`radarr.example.com`)
    #  - traefik.http.services.radarr.loadbalancer.server.port=7878

  # Music Management
  lidarr:
    image: lscr.io/linuxserver/lidarr:latest
    container_name: arr-lidarr
    environment:
      - PUID=${PUID:-1027}
      - PGID=${PGID:-100}
      - TZ=${TZ:-America/Edmonton}
    volumes:
      - ${DOCKER_VOLUME_STORAGE:-/volume1/docker}/lidarr:/config
      - ${MEDIA_STORAGE:-/volume1/data}:/data
    expose:
      - 8686/tcp
    ports:
      - ${LIDARR_PORT:-8686}:8686
    restart: unless-stopped
    #networks:
    #  - proxy
    #labels:
    #  - traefik.enable=true
    #  - traefik.docker.network=proxy
    #  - traefik.http.routers.lidarr.rule=Host(`lidarr.example.com`)
    #  - traefik.http.services.lidarr.loadbalancer.server.port=8686

  # Books/Audiobooks Management
  readarr:
    image: cr.hotio.dev/hotio/readarr:nightly
    container_name: arr-readarr
    environment:
      - PUID=${PUID:-1027}
      - PGID=${PGID:-100}
      - TZ=${TZ:-America/Edmonton}
    volumes:
      - ${DOCKER_VOLUME_STORAGE:-/volume1/docker}/readarr:/config
      - ${MEDIA_STORAGE:-/volume1/data}:/data
    expose:
      - 8787/tcp
    ports:
      - ${READARR_PORT:-8787}:8787
    restart: unless-stopped
    #networks:
    #  - proxy
    #labels:
    #  - traefik.enable=true
    #  - traefik.docker.network=proxy
    #  - traefik.http.routers.readarr.rule=Host(`readarr.example.com`)
    #  - traefik.http.services.readarr.loadbalancer.server.port=8787

  # Subtitle Management
  bazarr:
    image: lscr.io/linuxserver/bazarr:latest
    container_name: arr-bazarr
    environment:
      - PUID=${PUID:-1027}
      - PGID=${PGID:-100}
      - TZ=${TZ:-America/Edmonton}
    volumes:
      - ${DOCKER_VOLUME_STORAGE:-/volume1/docker}/bazaar:/config
      - ${MEDIA_STORAGE:-/volume1/data}:/data
    expose:
      - 6767/tcp
    ports:
      - ${BAZARR_PORT:-6767}:6767
    restart: unless-stopped
    #networks:
    #  - proxy
    #labels:
    #  - traefik.enable=true
    #  - traefik.docker.network=proxy
    #  - traefik.http.routers.bazarr.rule=Host(`bazarr.example.com`)
    #  - traefik.http.services.bazarr.loadbalancer.server.port=6767

  # Torrent Indexer Proxy (Legacy - consider migrating to Prowlarr)
  jackett:
    image: lscr.io/linuxserver/jackett:latest
    container_name: arr-jackett
    environment:
      - PUID=${PUID:-1027}
      - PGID=${PGID:-100}
      - TZ=${TZ:-America/Edmonton}
      - AUTO_UPDATE=true
    volumes:
      - ${DOCKER_VOLUME_STORAGE:-/volume1/docker}/jackett:/config
      - ${MEDIA_STORAGE:-/volume1/data}:/data
    expose:
      - 9117/tcp
    ports:
      - ${JACKETT_PORT:-9117}:9117
    restart: unless-stopped
    #networks:
    #  - proxy
    #labels:
    #  - traefik.enable=true
    #  - traefik.docker.network=proxy
    #  - traefik.http.routers.jackett.rule=Host(`jackett.example.com`)
    #  - traefik.http.services.jackett.loadbalancer.server.port=9117

networks:
  default:
    name: media-network
    external: true

# Uncomment if using Traefik reverse proxy
#  proxy:
#    external: true
