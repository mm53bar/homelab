version: "3.7"

services:
  sonarr:
    image: lscr.io/linuxserver/sonarr:latest
    container_name: sonarr
    restart: unless-stopped
    volumes:
      - /volume1/docker/sonarr:/config
      - /volume1/data:/data
    ports:
      - 8989:8989
    environment:
      - PUID=1027
      - PGID=100
      - TZ=America/Edmonton

networks:
  default:
    name: media-network
    external: true
