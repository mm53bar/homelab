version: "3.7"

services:
  radarr:
    image: lscr.io/linuxserver/radarr:latest
    container_name: radarr
    restart: unless-stopped
    volumes:
      - /volume1/docker/radarr:/config
      - /volume1/data:/data
    ports:
      - 7878:7878
    environment:
      - PUID=1027
      - PGID=100
      - TZ=America/Edmonton

networks:
  default:
    name: media-network
    external: true
