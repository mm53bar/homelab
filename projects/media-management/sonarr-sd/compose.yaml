version: "2.1"
services:
  sonarr-sd:
    build:
      context: https://github.com/mdhiggins/sonarr-sma.git#build
      args:
        - ffmpeg_tag=4.3-vaapi1804
    container_name: sonarr-sd
    environment:
      - PUID=1027
      - PGID=100
      - TZ=America/Edmonton
    volumes:
      - /volume1/docker/sonarr-sd:/config
      - /volume1/docker/sma-sonarr-sd:/usr/local/sma/config      
      - /volume1/data:/data
      - /volume1/data/torrents/complete:/complete
    ports:
      - 8990:8989
    restart: unless-stopped
    devices:
      - /dev/dri:/dev/dri
networks: 
  default: 
    external: true
    name: downloaders
