---
version: '2'
services:
  telly:
    image: tellytv/telly:dev-ffmpeg
    ports:
      - "6077:6077"
    environment:
      - PUID=1027
      - PGID=100
      - TZ=America/Edmonton
    volumes:
      - /volume1/docker/telly/telly.config.toml:/etc/telly/telly.config.toml
    restart: unless-stopped
networks: 
  default: 
    external: true
    name: downloaders  