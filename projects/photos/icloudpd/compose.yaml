version: '3.3'
services:
  icloudpd-mike:
    image: boredazfcuk/icloudpd:latest
    container_name: icloudpd-mike
    restart: always
    environment:
      - TZ=${TZ:-America/Edmonton}
      - user_id=${PUID:-1027}
      - group_id=${PGID:-100}
      - apple_id=${ICLOUDPD_MIKE_APPLE_ID:?ICLOUDPD_MIKE_APPLE_ID must be set}
      - authentication_type=2FA
      - folder_structure=${FOLDER_STRUCTURE:-{:%Y/%m}}
      - notification_days=${NOTIFICATION_DAYS:-7}
      - synchronisation_interval=${SYNC_INTERVAL:-86400}
      - download_path=${DOWNLOAD_PATH:-/icloud}
      - skip_check=${SKIP_CHECK:-false}
      - auto_delete=${AUTO_DELETE:-true}
    network_mode: host
    volumes:
      - '${CONFIG_STORAGE:-/volume1/docker}/icloudpd/mike_config:/config'
      - '${PHOTO_STORAGE:-/volume1/photo}/icloud/mike:/icloud'
  icloudpd-sheila:
    image: boredazfcuk/icloudpd:latest
    container_name: icloudpd-sheila
    restart: always
    environment:
      - TZ=${TZ:-America/Edmonton}
      - user_id=${PUID:-1027}
      - group_id=${PGID:-100}
      - apple_id=${ICLOUDPD_SHEILA_APPLE_ID:?ICLOUDPD_SHEILA_APPLE_ID must be set}
      - authentication_type=2FA
      - folder_structure=${FOLDER_STRUCTURE:-{:%Y/%m}}
      - notification_days=${NOTIFICATION_DAYS:-7}
      - synchronisation_interval=${SYNC_INTERVAL:-86400}
      - download_path=${DOWNLOAD_PATH:-/icloud}
      - skip_check=${SKIP_CHECK:-false}
      - auto_delete=${AUTO_DELETE:-true}
    network_mode: host
    volumes:
      - '${CONFIG_STORAGE:-/volume1/docker}/icloudpd/sheila_config:/config'
      - '${PHOTO_STORAGE:-/volume1/photo}/icloud/sheila:/icloud'