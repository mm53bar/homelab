name: immich

services:
  immich-server:
    container_name: immich_server
    image: ghcr.io/immich-app/immich-server:release
    user: "1027:937"
    devices:
      - /dev/dri:/dev/dri
    volumes:
      - /volume1/data/media/immich:/usr/src/app/upload
      - /volume1/photo/icloud/mike:/mnt/icloud_mike:ro
      - /volume1/photo/icloud/sheila:/mnt/icloud_sheila:ro      
      - /etc/localtime:/etc/localtime:ro
    environment:
      - UPLOAD_LOCATION=/usr/src/app/upload
      - DB_PASSWORD=postgres
      - DB_USERNAME=postgres
      - DB_DATABASE_NAME=immich
      - DB_HOSTNAME=database
      - REDIS_HOSTNAME=redis
      - IMMICH_MACHINE_LEARNING_URL=http://192.168.0.145:3003
    ports:
      - '2283:2283'
    depends_on:
      - redis
      - database
    restart: always
    networks:
      - immich-network
    deploy:
      resources:
        limits:
          memory: 1.5G
    healthcheck:
      disable: false

  redis:
    container_name: immich_redis
    image: docker.io/redis:6.2-alpine@sha256:905c4ee67b8e0aa955331960d2aa745781e6bd89afc44a8584bfd13bc890f0ae
    user: "1027:100"
    volumes:
      - /volume1/configs/immich/redis:/data
    command: redis-server --save 60 1 --loglevel warning
    healthcheck:
      test: redis-cli ping || exit 1
    restart: always
    networks:
      - immich-network
    deploy:
      resources:
        limits:
          memory: 256M

  database:
    container_name: immich_postgres
    image: docker.io/tensorchord/pgvecto-rs:pg14-v0.2.0@sha256:90724186f0a3517cf6914295b5ab410db9ce23190a2d9d0b9dd6463e3fa298f0
    user: "1027:100"
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_USER: postgres
      POSTGRES_DB: immich
      POSTGRES_INITDB_ARGS: '--data-checksums'
    volumes:
      - /volume1/configs/immich/postgres:/var/lib/postgresql/data
    healthcheck:
      test: >-
        pg_isready --dbname="$${POSTGRES_DB}" --username="$${POSTGRES_USER}" || exit 1;
        Chksum="$$(psql --dbname="$${POSTGRES_DB}" --username="$${POSTGRES_USER}" --tuples-only --no-align
        --command='SELECT COALESCE(SUM(checksum_failures), 0) FROM pg_stat_database')";
        echo "checksum failure count is $$Chksum";
        [ "$$Chksum" = '0' ] || exit 1
      interval: 5m
      timeout: 10s
      retries: 3
    command: >-
      postgres
      -c shared_preload_libraries=vectors.so
      -c 'search_path="$$user", public, vectors'
      -c logging_collector=on
      -c max_wal_size=2GB
      -c shared_buffers=512MB
      -c wal_compression=on
    restart: always
    networks:
      - immich-network
    deploy:
      resources:
        limits:
          memory: 768M
        

networks:
  immich-network:
    driver: bridge