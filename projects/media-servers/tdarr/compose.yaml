version: "3.7"

services:
  tdarr:
    image: ghcr.io/haveagitgat/tdarr:latest
    container_name: tdarr
    restart: unless-stopped
    volumes:
      - /volume1/docker/tdarr/server:/app/server
      - /volume1/docker/tdarr/configs:/app/configs
      - /volume1/docker/tdarr/logs:/app/logs
      - /volume1/docker/tdarr/temp:/temp
      - /volume1/docker/tdarr/presets:/presets
      - /volume1/data:/data
    devices:
      - /dev/dri:/dev/dri        
    ports:
      - 8265:8265
      - 8266:8266
    environment:
      - PUID=1027
      - PGID=100
      - TZ=America/Edmonton
      - serverIP=0.0.0.0
      - serverPort=8266
      - webUIPort=8265
      - internalNode=true
      - nodeID=Tdarr_Server



networks:
  default:
    name: downloaders
    external: true    